  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111317"/>
      <stop offset="58%" stop-color="#1e2229"/>
      <stop offset="100%" stop-color="#332823"/>
    </linearGradient>
